version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: pme_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama_pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull llama3.2:3b && ollama pull nomic-embed-text"
    restart: "no"

  backend:
    build: ./backend
    container_name: pme_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - UPLOAD_DIR=/app/data/uploads
      - PERSONA_DIR=/app/data/personas
      - SESSION_DIR=/app/data/sessions
      - MASTERY_CERT_DIR=/app/data/mastery_certs
      - SQLITE_URL=sqlite+aiosqlite:////app/data/pme.db
      - CORS_ORIGINS=["http://localhost:5173"]
    volumes:
      - ./backend/data:/app/data
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: pme_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  ollama_models:
